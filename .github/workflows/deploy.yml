name: Deploy Dashboard Application to EC2 via GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-14.04

    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ 52.63.34.104 }}
          username: ${{ ubuntu }}
          key: ${{  }}        # Isi dari file .pem Anda
          script: |
            # Login ke GHCR di dalam mesin EC2
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Hentikan dan hapus kontainer lama jika ada
            docker stop backend-api || true
            docker rm backend-api || true
            
            # Ambil image kontainer terbaru dari GHCR
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Jalankan kontainer baru di port 5000
            # Kontainer otomatis mewarisi hak akses AWS Athena lewat IAM Role EC2 Instance Profile Anda
            docker run -d \
              -p 80:5000 \
              --name backend-api \
              --restart always \
              -e AWS_DEFAULT_REGION=ap-southeast-2 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest