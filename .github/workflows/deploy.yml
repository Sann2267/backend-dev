name: Deploy Dashboard Application to EC2 via GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login ke GHCR menggunakan sudo
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Hentikan dan hapus kontainer lama jika ada
            sudo docker stop backend-api || true
            sudo docker rm backend-api || true
            
            # 3. Ambil image kontainer terbaru dari GHCR
            sudo docker pull ghcr.io/sann2267/backend-dev:latest
            
            # 4. Jalankan kontainer baru di port 80 (Akses Publik)
            # Kita langsung tulis alamat image-nya secara eksplisit tanpa variabel string bash
            sudo docker run -d \
              -p 80:5000 \
              --name backend-api \
              --restart always \
              -e AWS_DEFAULT_REGION=ap-southeast-2 \
              ghcr.io/sann2267/backend-dev:latest
